name: Stock Scanner V12 (Telegram)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
      - cron: "*/5 10-21 * * 1-5"

  workflow_dispatch:
    inputs:
      RUN_AFTER_HOURS:
        type: boolean
        description: "Allow running outside US market hours?"
        default: false
      ALWAYS_NOTIFY:
        type: boolean
        description: "Send summary even if no alerts?"
        default: true
      PING_ON_START:
        type: boolean
        description: "Send startup ping?"
        default: false
      PING_ON_END:
        type: boolean
        description: "Send completion ping?"
        default: false
      TICKERS:
        type: string
        description: "Optional ticker override list"
        default: ""
      PROFILE:
        type: choice
        description: "Scanner preset"
        options:
          - balanced (core)
          - conservative (strict)
          - aggressive (loose)
        default: balanced (core)
      DEBUG_DETAIL:
        type: choice
        options: [false, true]
        default: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      TZ: America/New_York
      WORKFLOW_VERSION: V12
      RUN_AFTER_HOURS: ${{ github.event_name == 'workflow_dispatch'
        && (inputs.RUN_AFTER_HOURS && 'true' || 'false')
        || (vars.RUN_AFTER_HOURS || 'false') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas numpy yfinance requests certifi
          fi

      # Weekend guard only
      - name: Weekend gate
        id: gate
        run: |
          dow=$(TZ=America/New_York date +%u)
          if [ "$dow" -ge 6 ]; then
            echo "ok=no" >> "$GITHUB_OUTPUT"
            echo "Weekend — skipping"
          else
            echo "ok=yes" >> "$GITHUB_OUTPUT"
          fi

      # ==================== NEW DEBUG STEP (shows exactly what will publish) ====================
      - name: Debug current NY time + hours that will publish
        run: |
          echo "=== CURRENT NY TIME ==="
          echo "Current NY time: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S (%Z)')"
          echo "Hour: $(TZ=America/New_York date +%H)"
          echo "Minute: $(TZ=America/New_York date +%M)"
          echo ""
          echo "=== INTENDED PUBLISH TIMES (exactly 4 per trading day) ==="
          echo "06:35 NY → pre-market"
          echo "09:30 NY → market open"
          echo "11:30 NY → midday"
          echo "14:30 NY → afternoon"
          echo ""
          echo "This run will ONLY proceed if current NY time matches one of the 4 windows above (±4 min grace)."

      # ==================== NEW TIME GATE (fixes your issue) ====================
      # Only allows the EXACT 4 desired NY times (works in EDT AND EST seasons)
      - name: Desired time gate (only 06:35 / 09:30 / 11:30 / 14:30 NY)
        id: timegate
        run: |
          H=$(TZ=America/New_York date +%H)
          M=$(TZ=America/New_York date +%M)
      
          NOW=$((10#$H * 60 + 10#$M))
      
          in_window () {
            local center=$1
            local range=7
            local start=$((center-range))
            local end=$((center+range))
            [ "$NOW" -ge "$start" ] && [ "$NOW" -le "$end" ]
          }
      
          if \
            in_window 395 || \
            in_window 570 || \
            in_window 690 || \
            in_window 870
          then
            echo "ok=yes" >> "$GITHUB_OUTPUT"
            echo "✅ MATCHED desired time: $H:$M NY → proceeding"
          else
            echo "ok=no" >> "$GITHUB_OUTPUT"
            echo "⏭️ Skipping — wrong time of day ($H:$M NY)"
          fi

      - name: Compute week key
        run: echo "WEEK_KEY=$(TZ=America/New_York date +%G-%V)" >> $GITHUB_ENV

      - name: Restore scanner cache
        id: scancache
        uses: actions/cache/restore@v4
        with:
          path: .scanner_cache
          key: scanner-cache-${{ runner.os }}-${{ env.WEEK_KEY }}
          restore-keys: |
            scanner-cache-${{ runner.os }}-

      - name: Expand PROFILE → environment
        shell: bash
        env:
          PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.PROFILE || 'balanced (core)' }}
          DEBUG_DETAIL: ${{ inputs.DEBUG_DETAIL }}
        run: |
          python - <<'PY'
          import os
      
          profile = (os.environ.get("PROFILE") or "balanced (core)").lower()
          version = os.environ.get("WORKFLOW_VERSION","V?")
      
          mode_map = {
            "balanced (core)": "Balanced",
            "conservative (strict)": "Conservative",
            "aggressive (loose)": "Aggressive"
          }
      
          mode = mode_map.get(profile,"Balanced")
      
          prefix = f"[ Scanner {version} | {mode} Mode ]"
      
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"PROFILE_EFFECTIVE={profile}\n")
              f.write(f"NOTIFY_PREFIX={prefix}\n")
              f.write(f"DEBUG_DETAIL={os.environ.get('DEBUG_DETAIL','false')}\n")
              f.write("FORCE_PREFIX_FROM_PROFILE=true\n")
      
          print("Prefix:", prefix)
          PY

      - name: Run scanner
        # UPDATED CONDITION: now requires BOTH gates + manual trigger bypass
        if: (steps.gate.outputs.ok == 'yes' && steps.timegate.outputs.ok == 'yes') || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          MARKET_ONLY: ${{ inputs.RUN_AFTER_HOURS && 'false' || 'true' }}
          ALWAYS_NOTIFY: ${{ github.event_name == 'workflow_dispatch'
            && (inputs.ALWAYS_NOTIFY && 'true' || 'false')
            || 'true' }}
          TELEGRAM_PING_ON_START: ${{ inputs.PING_ON_START && 'true' || 'false' }}
          TELEGRAM_PING_ON_END: ${{ inputs.PING_ON_END && 'true' || 'false' }}
          TICKERS: ${{ inputs.TICKERS }}
          CACHE_DIR: .scanner_cache
          NOTIFY_PREFIX: ${{ env.NOTIFY_PREFIX }}
          PROFILE_EFFECTIVE: ${{ env.PROFILE_EFFECTIVE }}
          FORCE_PREFIX_FROM_PROFILE: "true"
        run: |
          PYTHONUNBUFFERED=1 python scanner_dual_tf_vp_spyder_telegram_loop_dip11.py

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scanner-output
          path: |
            scanner_dual_tf_vp_dip11.csv
            .scanner_cache/alerts_dip11_seen.json

      - name: Save scanner cache
        if: steps.scancache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .scanner_cache
          key: scanner-cache-${{ runner.os }}-${{ env.WEEK_KEY }}
